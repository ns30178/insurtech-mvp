<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 1: 退休與通膨破產計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .input-group label { display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem; }
        .input-group input { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.375rem; background-color: #fff; }
        .input-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
    </style>
</head>
<body class="text-gray-800">

<div class="max-w-7xl mx-auto p-4 md:p-8">
    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 border-l-4 border-blue-600 pl-4">財務生存診斷：資產存活率演算</h1>
            <p class="text-gray-500 mt-2 ml-4">內部面談展示端 / 通膨風險具象化</p>
        </div>
        <button onclick="exportPDF()" id="pdf-btn" class="bg-gray-800 hover:bg-black text-white font-bold py-2 px-4 rounded-lg shadow transition-colors flex items-center">
            <span class="mr-2">📥</span> 匯出專屬診斷報告 (PDF)
        </button>
    </header>

    <div id="export-area" class="grid grid-cols-1 lg:grid-cols-3 gap-8 bg-slate-50 p-4 rounded-xl">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200" data-html2canvas-ignore="false">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">設定變數</h2>
            <div class="space-y-4">
                <div class="input-group">
                    <label>目前年齡</label>
                    <input type="number" id="currentAge" value="35" min="20" max="70" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>預計退休年齡</label>
                    <input type="number" id="retireAge" value="65" min="40" max="80" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>目前已備退休金 (萬元)</label>
                    <input type="number" id="currentAssets" value="100" min="0" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>每月可新增投入 (萬元)</label>
                    <input type="number" id="monthlySaving" value="2" min="0" step="0.1" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>期望退休月生活費 (萬元/現值)</label>
                    <input type="number" id="monthlyExpense" value="5" min="1" step="0.5" oninput="calculate()">
                </div>
                
                <div class="border-t pt-4 mt-4">
                    <h3 class="text-sm font-bold text-gray-500 mb-3">總體經濟假設參數</h3>
                    <div class="input-group mb-3">
                        <label>預估年通膨率 (%)</label>
                        <input type="number" id="inflationRate" value="2.5" step="0.1" oninput="calculate()">
                    </div>
                    <div class="input-group">
                        <label>理財工具年化報酬率 (%)</label>
                        <input type="number" id="roi" value="2.0" step="0.1" oninput="calculate()">
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-red-50 p-6 rounded-xl border border-red-100 flex flex-col justify-center items-center text-center">
                    <div class="text-red-500 font-bold mb-1">破產警戒線 (資產歸零)</div>
                    <div class="text-4xl font-extrabold text-red-700" id="bankruptAge">計算中...</div>
                    <div class="text-sm text-red-600 mt-2" id="bankruptMsg"></div>
                </div>
                <div class="bg-blue-50 p-6 rounded-xl border border-blue-100 flex flex-col justify-center items-center text-center">
                    <div class="text-blue-600 font-bold mb-1">通膨不作為成本 (退休時)</div>
                    <div class="text-4xl font-extrabold text-blue-800" id="coiValue">計算中...</div>
                    <div class="text-sm text-blue-600 mt-2">為維持目前生活品質，屆時每月需支出的實際金額</div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold mb-4">資產水位與通膨消耗軌跡</h2>
                <div class="relative h-80 w-full bg-white">
                    <canvas id="financeChart"></canvas>
                </div>
                <p class="text-xs text-gray-400 mt-4 text-center">本系統試算結果僅供財務規劃參考，不代表實際保證績效。實際保障與費率依各商品條款為準。</p>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    function calculate() {
        const currentAge = parseInt(document.getElementById('currentAge').value);
        const retireAge = parseInt(document.getElementById('retireAge').value);
        const currentAssets = parseFloat(document.getElementById('currentAssets').value) * 10000;
        const monthlySaving = parseFloat(document.getElementById('monthlySaving').value) * 10000;
        const monthlyExpense = parseFloat(document.getElementById('monthlyExpense').value) * 10000;
        const inflationRate = parseFloat(document.getElementById('inflationRate').value) / 100;
        const roi = parseFloat(document.getElementById('roi').value) / 100;

        let labels = [], assetData = [];
        let assets = currentAssets;
        let bankruptAge = null;

        for (let age = currentAge; age <= 100; age++) {
            labels.push(age + '歲');
            if (age < retireAge) {
                assets = assets * (1 + roi) + (monthlySaving * 12);
            } else {
                let yearsFromNow = age - currentAge;
                let inflatedAnnualExpense = (monthlyExpense * 12) * Math.pow(1 + inflationRate, yearsFromNow);
                assets = assets * (1 + roi) - inflatedAnnualExpense;
                if (assets < 0 && bankruptAge === null) bankruptAge = age;
            }
            assetData.push(Math.round(assets / 10000));
        }

        let futureExpense = monthlyExpense * Math.pow(1 + inflationRate, retireAge - currentAge);
        updateUI(bankruptAge, futureExpense);
        drawChart(labels, assetData, bankruptAge, currentAge);
    }

    function updateUI(bankruptAge, futureExpense) {
        const bankruptElem = document.getElementById('bankruptAge');
        const bankruptMsg = document.getElementById('bankruptMsg');
        
        if (bankruptAge) {
            bankruptElem.innerText = bankruptAge + " 歲";
            bankruptElem.classList.replace('text-green-600', 'text-red-700');
            bankruptMsg.innerText = "無法支撐至平均餘命 (85歲)";
        } else {
            bankruptElem.innerText = "安全過關";
            bankruptElem.classList.replace('text-red-700', 'text-green-600');
            bankruptMsg.innerText = "資產足以支撐至 100 歲";
        }
        document.getElementById('coiValue').innerText = (futureExpense / 10000).toFixed(1) + " 萬";
    }

    function drawChart(labels, assetData, bankruptAge, currentAge) {
        const ctx = document.getElementById('financeChart').getContext('2d');
        if (myChart) myChart.destroy();
        let pointColors = assetData.map(val => val < 0 ? 'rgba(239, 68, 68, 1)' : 'rgba(59, 130, 246, 1)');

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '資產餘額 (萬元)', data: assetData, borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, fill: true,
                    pointBackgroundColor: pointColors, pointRadius: 3
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false, // 關閉動畫以利截圖
                plugins: { legend: { position: 'top' } },
                scales: { y: { grid: { color: '#e2e8f0' }, ticks: { callback: v => v + '萬' } }, x: { grid: { display: false } } }
            }
        });
    }

    // PDF 匯出功能
    async function exportPDF() {
        const btn = document.getElementById('pdf-btn');
        btn.innerHTML = "⏳ 正在產生報告...";
        btn.disabled = true;

        const element = document.getElementById('export-area');
        
        // 使用 html2canvas 將網頁元素轉為圖片
        const canvas = await html2canvas(element, {
            scale: 2, // 提高解析度
            useCORS: true,
            backgroundColor: '#f8fafc'
        });

        const imgData = canvas.toDataURL('image/png');
        
        // 使用 jsPDF 將圖片放入 PDF 中
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4'); // 'l' 為橫式
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
        pdf.save('個人財務生存診斷報告.pdf');

        btn.innerHTML = '<span class="mr-2">📥</span> 匯出專屬診斷報告 (PDF)';
        btn.disabled = false;
    }

    window.onload = calculate;
</script>

</body>
</html>
